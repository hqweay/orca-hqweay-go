name: Create Release on Tag Push

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # Install Node.js
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          registry-url: "https://registry.npmjs.org"

        # Install pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        id: pnpm-install
        with:
          version: 8
          run_install: false

      # Get pnpm store directory
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      # Setup pnpm cache
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install

      # Build for production, 这一步会生成一个 package.zip
      - name: Build for production
        run: pnpm build

      - name: Generate Release Body
        id: release_body
        run: |
          # 从 CHANGELOG.md 提取当前版本的更新日志
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Extracting changelog for version: $VERSION"
          
          # 使用 awk 提取当前版本的 changelog 条目
          awk '/^## v'"$VERSION"'/{found=1; next} /^## v/{if(found) exit} found{print}' CHANGELOG.md > release_body.md
          
          # 如果提取失败，使用默认内容
          if [ ! -s release_body.md ]; then
            echo "## v${VERSION}" > release_body.md
            echo "" >> release_body.md
            echo "See [CHANGELOG.md](https://github.com/hqweay/orca-hqweay-go/blob/main/CHANGELOG.md) for details." >> release_body.md
          fi
          
          cat release_body.md

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          owner: hqweay
          repo: orca-hqweay-go
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "package.zip"
          token: ${{ secrets.RELEASE_TOKEN }}
          prerelease: false
          bodyFile: release_body.md

      - name: Auto Create PR to Plugin Registry
        if: endsWith(github.ref, '.0')
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          UPSTREAM_REPO: sethyuan/awesome-orcanote
          FORK_REPO: hqweay/awesome-orcanote
          PLUGIN_ID: orca-hqweay-go
        run: |
          # 1. 提取版本号
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "Deploying version: ${VERSION}"

          # 2. Clone Fork 仓库
          git clone https://${GH_TOKEN}@github.com/${FORK_REPO}.git registry
          cd registry

          # 3. 配置 Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 4. 同步官方最新代码并切分支
          git remote add upstream https://github.com/${UPSTREAM_REPO}.git
          git fetch upstream
          BRANCH_NAME="update-${PLUGIN_ID}-v${VERSION}"
          git checkout -B ${BRANCH_NAME} upstream/main

          # 5. 更新 plugins.json 数据
          node -e "
            const fs = require('fs');
            const file = 'plugins.json';
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            const plugin = data.find(p => p.id === '${PLUGIN_ID}');
            if (plugin) {
              plugin.version = '${VERSION}';
              plugin.updated = new Date().toISOString();
              plugin.zip = 'https://github.com/hqweay/orca-hqweay-go/releases/download/v${VERSION}/package.zip';
              fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
              console.log('Successfully updated plugins.json');
            } else {
              console.error('Plugin not found in registry!');
              process.exit(1);
            }
          "

          # 6. 提交修改并 Push
          git add plugins.json
          git commit -m "chore: update ${PLUGIN_ID} to v${VERSION}"
          git push -f origin ${BRANCH_NAME}

          # 7. 组装 PR 内容并向官方仓库发起 PR
          echo "🚀 Automated PR to update **${PLUGIN_ID}** to version **${VERSION}**." > pr_body.md
          echo "" >> pr_body.md
          echo "### 📝 Changelog:" >> pr_body.md
          cat ../release_body.md >> pr_body.md

          gh pr create \
            --repo ${UPSTREAM_REPO} \
            --head hqweay:${BRANCH_NAME} \
            --base main \
            --title "Update plugin ${PLUGIN_ID} to v${VERSION}" \
            --body-file pr_body.md