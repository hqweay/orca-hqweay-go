name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 并发控制：同一时间只运行一个 release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# 最小权限原则
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 提取当前版本的 changelog
          awk '/^## v?'"$VERSION"'/{found=1; next} /^## /{if(found) exit} found{print}' CHANGELOG.md > release_body.md
          
          if [ ! -s release_body.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > release_body.md
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          owner: hqweay
          repo: orca-hqweay-go
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: "package.zip"
          bodyFile: release_body.md
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Sync Docs to Public Repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git clone https://x-access-token:${GH_TOKEN}@github.com/hqweay/orca-hqweay-go.git public-repo
          
          cp README.md public-repo/
          cp CHANGELOG.md public-repo/
          
          cd public-repo
          git add README.md CHANGELOG.md
          
          if git diff --staged --quiet; then
            echo "No changes to sync."
          else
            git commit -m "docs: sync README and CHANGELOG for ${{ github.ref_name }}"
            git push
            echo "Successfully synced README and CHANGELOG."
          fi

      - name: Sync README to Blog
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/hqweay/my-blog.git blog-repo
          
          cat << EOF > new_post.md
          ---
          permalink: /20260120023137/
          title: 恐龙工具箱（虎鲸笔记版）
          date: "2026-01-20 02:31:37"
          updated: "$(date +"%Y-%m-%d %H:%M:%S")"
          tags:
            - ArcTab
          comments: true
          toc: true
          ---
          
          EOF
          
          # Remove leading spaces from the cat heredoc
          sed -i.bak 's/^[ \t]*//' new_post.md
          rm new_post.md.bak
          
          cat README.md >> new_post.md
          
          mv new_post.md blog-repo/source/_posts/20260120023137.md
          
          cd blog-repo
          git add source/_posts/20260120023137.md
          
          if git diff --staged --quiet; then
            echo "No changes to blog."
          else
            git commit -m "docs: update 恐龙工具箱 for ${{ github.ref_name }}"
            git push
            echo "Successfully synced README to Blog."
          fi

      - name: Trigger Registry Update
        if: contains(github.event.head_commit.message, '[update registry]')
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh workflow run update-registry.yml -f version="$VERSION"
