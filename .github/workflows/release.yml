name: Release

on:
  push:
    tags:
      - "v*"

# 并发控制：同一时间只运行一个 release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# 最小权限原则
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 提取当前版本的 changelog
          awk '/^## v'"$VERSION"'/{found=1; next} /^## v/{if(found) exit} found{print}' CHANGELOG.md > release_body.md
          
          if [ ! -s release_body.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > release_body.md
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          owner: hqweay
          repo: orca-hqweay-go
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: "build/dist/package.zip"
          bodyFile: release_body.md
          token: ${{ secrets.RELEASE_TOKEN }}
