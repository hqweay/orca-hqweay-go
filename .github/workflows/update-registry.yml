name: Update Plugin Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version (e.g., 2.13.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Update plugin registry
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const VERSION = '${{ inputs.version }}';
            const PLUGIN_ID = 'orca-hqweay-go';
            const BRANCH_NAME = `update-${PLUGIN_ID}-v${VERSION}`;
            const ZIP_URL = `https://github.com/hqweay/orca-hqweay-go/releases/download/v${VERSION}/package.zip`;

            // 1. 检查是否已存在 PR
            const existingPRs = await github.rest.pulls.list({
              owner: 'hqweay',
              repo: 'awesome-orcanote',
              head: `hqweay:${BRANCH_NAME}`,
              state: 'open'
            });
            
            if (existingPRs.data.length > 0) {
              console.log(`PR already exists: ${existingPRs.data[0].html_url}`);
              return;
            }

            // 2. 获取 plugins.json
            const { data: fileData } = await github.rest.repos.getContent({
              owner: 'hqweay',
              repo: 'awesome-orcanote',
              path: 'plugins.json',
              ref: 'main'
            });

            // 3. 修改
            const content = Buffer.from(fileData.content, 'base64').toString('utf8');
            const plugins = JSON.parse(content);
            const plugin = plugins.find(p => p.id === PLUGIN_ID);
            
            if (!plugin) {
              core.setFailed(`Plugin ${PLUGIN_ID} not found`);
              return;
            }

            plugin.version = VERSION;
            plugin.updated = new Date().toISOString();
            plugin.zip = ZIP_URL;

            const newContent = JSON.stringify(plugins, null, 2) + '\n';
            const encodedContent = Buffer.from(newContent).toString('base64');

            // 4. 创建分支并提交
            const { data: mainRef } = await github.rest.git.getRef({
              owner: 'hqweay',
              repo: 'awesome-orcanote',
              ref: 'heads/main'
            });

            await github.rest.git.createRef({
              owner: 'hqweay',
              repo: 'awesome-orcanote',
              ref: `refs/heads/${BRANCH_NAME}`,
              sha: mainRef.object.sha
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: 'hqweay',
              repo: 'awesome-orcanote',
              path: 'plugins.json',
              message: `chore: update ${PLUGIN_ID} to v${VERSION}`,
              content: encodedContent,
              sha: fileData.sha,
              branch: BRANCH_NAME
            });

            // 5. 创建 PR
            const prBody = `## 🚀 Automated Update\n\nUpdate **${PLUGIN_ID}** to version **v${VERSION}**.\n\n### Changes\n- Version: ${VERSION}\n- Download: ${ZIP_URL}`;

            const { data: pr } = await github.rest.pulls.create({
              owner: 'sethyuan',
              repo: 'awesome-orcanote',
              title: `Update ${PLUGIN_ID} to v${VERSION}`,
              head: `hqweay:${BRANCH_NAME}`,
              base: 'main',
              body: prBody
            });

            console.log(`PR created: ${pr.html_url}`);
